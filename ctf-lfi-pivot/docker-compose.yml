version: "3.8"

services:
  # Máquina 1: web PHP vulnerable a LFI -> Log Poisoning -> RCE
  web:
    build: ./web
    container_name: ctf-web
    ports:
      - "8080:80"          # única puerta de entrada expuesta al "atacante"
    networks:
      - frontend
      - internal
    restart: unless-stopped

  # Máquina 2: Samba 4.6.3 (vulhub) - vulnerable a CVE-2017-7494 (SambaCry)
  # SOLO alcanzable desde dentro de "internal", sin publicar puertos al host
  internal-vuln:
    image: vulhub/samba:4.6.3
    container_name: ctf-internal
    tty: true
    volumes:
      - ./internal/smb.conf:/usr/local/samba/etc/smb.conf
      - ./internal/share:/home/share
      - ./internal/flag2.txt:/root/flag2.txt
    networks:
      - internal
    restart: unless-stopped
    # IMPORTANTE: no añadir "ports" aquí. Si publicas 445/6699 al host,
    # la máquina deja de estar aislada y ya no haría falta pivotar desde
    # "web" para alcanzarla, lo cual rompe el planteamiento del reto.
    # Dentro de la red "internal" el puerto sigue expuesto y accesible
    # para cualquier contenedor conectado a esa red (ctf-web).

networks:
  frontend:
    driver: bridge
  internal:
    driver: bridge
    internal: true   # sin salida a Internet / red del host -> solo containers de esta red se ven entre sí
